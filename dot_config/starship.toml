# Starship Configuration with Tokyo Night Colors
"$schema" = 'https://starship.rs/config-schema.json'

format = "$directory$git_branch$git_status$rust$nodejs$golang$cmd_duration$line_break$character"
right_format = ""

add_newline = false

palette = "nightowl"

[palettes.nightowl]
bg = "#011627"
fg = "#d6deeb"
black = "#5f7e97"
red = "#ef5350"
green = "#addb67"
yellow = "#ffcb8b"
blue = "#82aaff"
magenta = "#c792ea"
cyan = "#21c7a8"
white = "#ffffff"
[character]
success_symbol = "[❯](bold green) "
error_symbol = "[❯](bold red) "

[directory]
style = "bold cyan"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold magenta"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version)]($style) "

[rust]
symbol = " "
style = "bold red"
format = "via [$symbol($version)]($style) "

[golang]
symbol = " "
style = "bold blue"
format = "via [$symbol($version)]($style) "

[cmd_duration]
style = "bold yellow"
format = "took [$duration]($style) "
